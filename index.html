<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Robe — Daily Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --sand: #F5EFE6; --blush: #D4A5A5; --blush-deep: #B87E7E;
    --ink: #2C2218; --ink-light: #6B5B4E; --cream: #FAF7F2; --white: #FFFFFF;
    --border: #E2D5C8; --pending: #C4956A; --delivered: #7A9E7E; --cancelled: #C0635C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; font-size: 14px; }

  header { background: var(--ink); color: var(--sand); padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
  .brand span { color: var(--blush); font-style: italic; font-weight: 400; }
  .date-badge { font-size: 11px; font-weight: 300; letter-spacing: 0.08em; color: #A89880; text-transform: uppercase; }
  .sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #A89880; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--delivered); }
  .sync-dot.offline { background: var(--cancelled); }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat { background: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; text-align: center; }
  .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--ink); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--ink-light); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .stat.revenue .stat-value { color: var(--blush-deep); }

  .panel { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .panel-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; letter-spacing: 0.06em; margin-bottom: 16px; color: var(--ink); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); }
  input, select, textarea { border: 1px solid var(--border); border-radius: 4px; padding: 9px 12px; font-family: 'Jost', sans-serif; font-size: 13px; color: var(--ink); background: var(--cream); transition: border-color 0.15s; outline: none; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--blush-deep); background: var(--white); }
  textarea { resize: vertical; min-height: 60px; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
  .btn { font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 22px; border: none; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--ink); color: var(--sand); }
  .btn-primary:hover { background: var(--blush-deep); }
  .btn-primary:disabled { background: var(--border); color: var(--ink-light); cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--ink-light); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--ink-light); }
  .btn-danger { background: transparent; color: var(--cancelled); border: 1px solid #E8C0BF; }
  .btn-danger:hover { background: #FAEAEA; }

  .orders-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .orders-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; }
  .filter-row { display: flex; gap: 8px; }
  .filter-btn { font-size: 11px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); color: var(--ink-light); cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.12s; }
  .filter-btn.active { background: var(--ink); color: var(--sand); border-color: var(--ink); }

  .orders-list { display: flex; flex-direction: column; gap: 8px; }
  .order-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; display: grid; grid-template-columns: auto 1fr auto auto;
    gap: 14px; align-items: center; transition: box-shadow 0.15s; cursor: pointer;
  }
  .order-card:hover { box-shadow: 0 2px 10px rgba(44,34,24,0.1); border-color: var(--blush); }
  .order-num { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--blush); min-width: 38px; text-align: center; }
  .order-info { display: flex; flex-direction: column; gap: 3px; }
  .order-customer { font-weight: 500; font-size: 14px; }
  .order-product { font-size: 12px; color: var(--ink-light); }
  .order-delivery { font-size: 11px; color: #A89880; margin-top: 1px; }
  .order-price { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; text-align: right; white-space: nowrap; }
  .order-actions { display: flex; gap: 6px; align-items: center; }
  .view-hint { font-size: 10px; color: #C4B5A8; letter-spacing: 0.05em; margin-top: 2px; }

  .status-badge { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .status-pending   { background: #FDF3E7; color: var(--pending);   border: 1px solid #EDD9B8; }
  .status-delivered { background: #EBF4EC; color: var(--delivered); border: 1px solid #BAD8BC; }
  .status-cancelled { background: #FAEAEA; color: var(--cancelled); border: 1px solid #E8C0BF; }

  .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-light); padding: 4px 6px; border-radius: 3px; font-size: 14px; line-height: 1; transition: color 0.12s; }
  .icon-btn:hover { color: var(--blush-deep); }
  .icon-btn.del:hover { color: var(--cancelled); }

  .empty { text-align: center; padding: 50px 20px; color: var(--ink-light); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
  .empty-text { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; }
  .empty-sub { font-size: 12px; margin-top: 5px; color: #A89880; }

  /* ── MODALS ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,34,24,0.5); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 10px; padding: 0; width: min(480px, 100%); max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 22px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--ink); line-height: 1.2; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--ink-light); font-size: 20px; line-height: 1; padding: 2px; flex-shrink: 0; }
  .modal-close:hover { color: var(--ink); }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ── DETAIL VIEW ── */
  .detail-badge-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .detail-order-num { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; color: var(--blush); line-height: 1; }
  .detail-time { font-size: 12px; color: #A89880; }

  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-field { display: flex; flex-direction: column; gap: 3px; }
  .detail-field.full { grid-column: 1 / -1; }
  .detail-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #A89880; }
  .detail-value { font-size: 14px; color: var(--ink); font-weight: 400; }
  .detail-value.price { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--blush-deep); }
  .detail-value.empty-val { color: #C4B5A8; font-style: italic; }

  .detail-notes-box { background: var(--cream); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; font-size: 13px; color: var(--ink); line-height: 1.5; }

  /* status select inline */
  .status-select-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .status-select-row select { width: auto; flex: 1; }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--sand); padding: 12px 20px; border-radius: 6px; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: var(--cancelled); }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .order-card { grid-template-columns: auto 1fr; grid-template-rows: auto auto; }
    .order-price { grid-column: 2; }
    .order-actions { grid-column: 1 / -1; justify-content: flex-end; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">La <span>Robe</span> Maldives</div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
    <div class="date-badge" id="headerDate"></div>
    <div class="sync-indicator"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Connecting…</span></div>
  </div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Orders Today</div></div>
    <div class="stat"><div class="stat-value" id="statPending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-value" id="statDelivered">0</div><div class="stat-label">Delivered</div></div>
    <div class="stat revenue"><div class="stat-value" id="statRevenue">0</div><div class="stat-label">MVR Revenue</div></div>
  </div>

  <div class="panel">
    <div class="panel-title">New Order</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" id="customerName" placeholder="e.g. Aminath Riyasha">
      </div>
      <div class="form-group">
        <label>Contact (Viber / WhatsApp)</label>
        <input type="text" id="customerContact" placeholder="+960 7xx xxxx">
      </div>
      <div class="form-group">
        <label>Product</label>
        <select id="product">
          <option value="">Select product…</option>
          <option>Shoulder Bag — Natural</option>
          <option>Shoulder Bag — Black</option>
          <option>Crossbody Moon Bag — Beige</option>
          <option>Crossbody Moon Bag — Brown</option>
          <option>PU Leather Tote — Cream</option>
          <option>PU Leather Tote — Tan</option>
          <option>PU Leather Tote — Black</option>
          <option>Other / Custom</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price (MVR)</label>
        <input type="number" id="price" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Delivery Method</label>
        <select id="delivery">
          <option value="Local Delivery">Local Delivery (Hulhumalé)</option>
          <option value="Male Delivery">Malé Delivery</option>
          <option value="Harbour / Ferry">Harbour / Ferry</option>
          <option value="Pickup">Customer Pickup</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment</label>
        <select id="payment">
          <option value="BML Transfer">BML Transfer</option>
          <option value="Cash on Delivery">Cash on Delivery</option>
          <option value="MIB Transfer">MIB Transfer</option>
          <option value="Paid via Messenger">Paid via Messenger</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="notes" placeholder="Colour preference, address, special instructions…"></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
      <button class="btn btn-primary" id="submitBtn" onclick="addOrder()">Record Order</button>
    </div>
  </div>

  <div class="orders-header">
    <div class="orders-title">Today's Orders</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('delivered',this)">Delivered</button>
    </div>
  </div>

  <div class="orders-list" id="ordersList">
    <div class="empty"><div class="empty-icon">🛍</div><div class="empty-text">Loading orders…</div></div>
  </div>
</div>

<!-- ── ORDER DETAIL MODAL ── -->
<div class="modal-overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="detailTitle">Order Detail</div>
        <div class="detail-time" id="detailTime"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="detailDeleteBtn">Delete Order</button>
      <button class="btn btn-ghost" onclick="closeDetail()">Close</button>
      <button class="btn btn-primary" id="detailSaveBtn">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://oyzfkknoeweafiqirurv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95emZra25vZXdlYWZpcWlydXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjY1NTcsImV4cCI6MjA5NzAwMjU1N30.d7CkBi6Yc47a_VzFFbKfZG8ncm7hG9p4XJBDJ1zcjrY';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let orders = [];
  let activeFilter = 'all';
  let viewingId = null;

  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function setHeaderDate() {
    document.getElementById('headerDate').textContent =
      new Date().toLocaleDateString('en-MV', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }

  function setSyncStatus(online) {
    document.getElementById('syncDot').className = 'sync-dot' + (online ? '' : ' offline');
    document.getElementById('syncLabel').textContent = online ? 'Live' : 'Offline';
  }

  // ── LOAD ──────────────────────────────────────────────────────────────────
  async function loadOrders() {
    const { data, error } = await db
      .from('orders').select('*')
      .eq('order_date', todayStr())
      .order('created_at', { ascending: false });
    if (error) { setSyncStatus(false); toast('Could not load orders: ' + error.message, true); return; }
    setSyncStatus(true);
    orders = data || [];
    render();
  }

  // ── ADD ───────────────────────────────────────────────────────────────────
  async function addOrder() {
    const name     = document.getElementById('customerName').value.trim();
    const contact  = document.getElementById('customerContact').value.trim();
    const product  = document.getElementById('product').value;
    const price    = parseFloat(document.getElementById('price').value) || 0;
    const delivery = document.getElementById('delivery').value;
    const payment  = document.getElementById('payment').value;
    const notes    = document.getElementById('notes').value.trim();

    if (!name || !product) { toast('Please fill in customer name and product.', true); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    const nextNum = orders.length > 0 ? Math.max(...orders.map(o => o.num || 0)) + 1 : 1;
    const { data, error } = await db.from('orders').insert({
      num: nextNum, customer_name: name, contact, product, price,
      delivery, payment, notes, status: 'pending',
      order_date: todayStr(),
      order_time: new Date().toLocaleTimeString('en-MV', { hour:'2-digit', minute:'2-digit' })
    }).select();

    btn.disabled = false; btn.textContent = 'Record Order';
    if (error) { toast('Error: ' + error.message, true); return; }
    if (data && data.length > 0) orders.unshift(data[0]);
    render();
    clearForm();
    toast('Order #' + nextNum + ' recorded ✓');
  }

  function clearForm() {
    ['customerName','customerContact','notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('price').value = '';
    document.getElementById('product').value = '';
  }

  // ── RENDER LIST ───────────────────────────────────────────────────────────
  function render() {
    const filtered = activeFilter === 'all' ? orders : orders.filter(o => o.status === activeFilter);
    const list = document.getElementById('ordersList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">🛍</div>
        <div class="empty-text">${activeFilter === 'all' ? 'No orders yet today' : 'No ' + activeFilter + ' orders'}</div>
        <div class="empty-sub">${activeFilter === 'all' ? 'Record your first order above' : ''}</div>
      </div>`;
    } else {
      list.innerHTML = filtered.map(o => `
        <div class="order-card" onclick="openDetail(${o.id})">
          <div class="order-num">#${o.num}</div>
          <div class="order-info">
            <div class="order-customer">${esc(o.customer_name)}${o.contact ? ' · ' + esc(o.contact) : ''}</div>
            <div class="order-product">${esc(o.product)}</div>
            <div class="order-delivery">${esc(o.delivery)} · ${esc(o.payment)}</div>
            <div class="view-hint">Tap to view details</div>
          </div>
          <div class="order-price">MVR ${Number(o.price).toLocaleString()}</div>
          <div class="order-actions" onclick="event.stopPropagation()">
            <span class="status-badge status-${o.status}">${o.status}</span>
          </div>
        </div>`).join('');
    }
    updateStats();
  }

  function updateStats() {
    const pending   = orders.filter(o => o.status === 'pending').length;
    const delivered = orders.filter(o => o.status === 'delivered').length;
    const revenue   = orders.filter(o => o.status !== 'cancelled').reduce((s,o) => s + Number(o.price), 0);
    document.getElementById('statTotal').textContent     = orders.length;
    document.getElementById('statPending').textContent   = pending;
    document.getElementById('statDelivered').textContent = delivered;
    document.getElementById('statRevenue').textContent   = revenue.toLocaleString();
  }

  // ── FILTER ────────────────────────────────────────────────────────────────
  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── DETAIL MODAL ──────────────────────────────────────────────────────────
  function openDetail(id) {
    viewingId = id;
    const o = orders.find(x => x.id === id);
    if (!o) return;

    document.getElementById('detailTitle').textContent = 'Order #' + o.num;
    document.getElementById('detailTime').textContent  = (o.order_time || '') + ' · ' + (o.order_date || '');

    document.getElementById('detailBody').innerHTML = `
      <div class="detail-badge-row">
        <div class="detail-order-num">#${o.num}</div>
        <span class="status-badge status-${o.status}">${o.status}</span>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Customer</div>
        <div class="detail-grid">
          <div class="detail-field">
            <div class="detail-label">Name</div>
            <div class="detail-value">${esc(o.customer_name)}</div>
          </div>
          <div class="detail-field">
            <div class="detail-label">Contact</div>
            <div class="detail-value ${o.contact ? '' : 'empty-val'}">${o.contact ? esc(o.contact) : 'Not provided'}</div>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Order</div>
        <div class="detail-grid">
          <div class="detail-field full">
            <div class="detail-label">Product</div>
            <div class="detail-value">${esc(o.product)}</div>
          </div>
          <div class="detail-field">
            <div class="detail-label">Price</div>
            <div class="detail-value price">MVR ${Number(o.price).toLocaleString()}</div>
          </div>
          <div class="detail-field">
            <div class="detail-label">Payment</div>
            <div class="detail-value">${esc(o.payment)}</div>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Delivery</div>
        <div class="detail-grid">
          <div class="detail-field full">
            <div class="detail-label">Method</div>
            <div class="detail-value">${esc(o.delivery)}</div>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Notes</div>
        ${o.notes
          ? `<div class="detail-notes-box">${esc(o.notes)}</div>`
          : `<div class="detail-value empty-val">No notes added</div>`}
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Update Status</div>
        <div class="status-select-row">
          <select id="detailStatus">
            <option value="pending"   ${o.status==='pending'   ? 'selected' : ''}>Pending</option>
            <option value="delivered" ${o.status==='delivered' ? 'selected' : ''}>Delivered</option>
            <option value="cancelled" ${o.status==='cancelled' ? 'selected' : ''}>Cancelled</option>
          </select>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Update Notes</div>
        <textarea id="detailNotes" placeholder="Add or update notes…">${esc(o.notes || '')}</textarea>
      </div>
    `;

    document.getElementById('detailSaveBtn').onclick   = saveDetail;
    document.getElementById('detailDeleteBtn').onclick = () => deleteOrder(id);
    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('open');
    viewingId = null;
  }

  async function saveDetail() {
    const newStatus = document.getElementById('detailStatus').value;
    const newNotes  = document.getElementById('detailNotes').value.trim();

    const { error } = await db.from('orders')
      .update({ status: newStatus, notes: newNotes })
      .eq('id', viewingId);

    if (error) { toast('Error: ' + error.message, true); return; }

    const o = orders.find(x => x.id === viewingId);
    if (o) { o.status = newStatus; o.notes = newNotes; }
    closeDetail();
    render();
    toast('Order updated ✓');
  }

  async function deleteOrder(id) {
    if (!confirm('Delete this order? This cannot be undone.')) return;
    const { error } = await db.from('orders').delete().eq('id', id);
    if (error) { toast('Error: ' + error.message, true); return; }
    orders = orders.filter(o => o.id !== id);
    closeDetail();
    render();
    toast('Order deleted');
  }

  // ── UTILS ─────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isError ? 'show error' : 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2800);
  }

  document.getElementById('detailOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  db.channel('orders-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => loadOrders())
    .subscribe();

  setHeaderDate();
  loadOrders();
</script>
</body>
</html>
